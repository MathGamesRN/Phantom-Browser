<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Phantom — Server Proxy Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0b0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #7c6af7;
      --accent2: #c47af7;
      --text: #e2e2f0;
      --muted: #6e6e8a;
      --danger: #f97066;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,106,247,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(196,122,247,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .grid-overlay {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Logo */
    .logo-wrap {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.7s ease both;
    }

    .logo-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 12px;
      animation: spin 8s linear infinite;
      display: inline-block;
      filter: drop-shadow(0 0 24px rgba(124,106,247,0.7));
    }

    @keyframes spin {
      0%, 100% { transform: rotateY(0deg); }
      50% { transform: rotateY(180deg); }
    }

    .logo-title {
      font-family: 'Syne', sans-serif;
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #e2e2f0 30%, var(--accent) 60%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* Search card */
    .card {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 0 0 1px rgba(124,106,247,0.05), 0 24px 60px rgba(0,0,0,0.5);
      animation: fadeUp 0.7s 0.1s ease both;
    }

    .tab-row {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      background: var(--bg);
      padding: 4px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 9px;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--muted);
      border: none;
      background: transparent;
      font-family: 'DM Mono', monospace;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 12px rgba(124,106,247,0.4);
    }

    .tab:not(.active):hover { color: var(--text); }

    .panel { display: none; }
    .panel.active { display: block; }

    .input-row {
      display: flex;
      gap: 10px;
    }

    .search-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 14px 18px;
      font-size: 14px;
      font-family: 'DM Mono', monospace;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
    }

    .search-input::placeholder { color: var(--muted); }

    .go-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 14px 24px;
      border-radius: 10px;
      font-size: 13px;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
      white-space: nowrap;
      position: relative;
      overflow: hidden;
    }

    .go-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.1);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .go-btn:hover::after { opacity: 1; }
    .go-btn:hover { box-shadow: 0 4px 20px rgba(124,106,247,0.5); transform: translateY(-1px); }
    .go-btn:active { transform: translateY(0); }

    .hint {
      margin-top: 12px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    /* Quick links */
    .quick-section {
      margin-top: 40px;
      width: 100%;
      max-width: 680px;
      animation: fadeUp 0.7s 0.2s ease both;
    }

    .quick-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .quick-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: block;
    }

    .quick-card:hover {
      border-color: var(--accent);
      background: rgba(124,106,247,0.08);
      transform: translateY(-2px);
    }

    .quick-icon { font-size: 22px; display: block; margin-bottom: 6px; }
    .quick-name { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }

    /* Status bar */
    .status-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 11px;
      color: var(--muted);
      z-index: 10;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4af7a0;
      box-shadow: 0 0 8px #4af7a0;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 500px) {
      .logo-title { font-size: 38px; }
      .quick-grid { grid-template-columns: repeat(2, 1fr); }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="grid-overlay"></div>

  <div class="container">

    <div class="logo-wrap">
      <span class="logo-icon">◈</span>
      <div class="logo-title">PHANTOM</div>
      <div class="logo-sub">Server-Side Proxy Browser</div>
    </div>

    <div class="card">
      <div class="tab-row">
        <button class="tab active" onclick="switchTab('search')">⌕ Search</button>
        <button class="tab" onclick="switchTab('url')">⇗ Go to URL</button>
      </div>

      <!-- Search panel -->
      <div class="panel active" id="panel-search">
        <form action="/search" method="GET">
          <div class="input-row">
            <input class="search-input" type="text" name="q" placeholder="Search DuckDuckGo..." autofocus autocomplete="off" />
            <button class="go-btn" type="submit">Search →</button>
          </div>
        </form>
        <div class="hint">↳ All traffic routed server-side · Powered by DuckDuckGo</div>
      </div>

      <!-- URL panel -->
      <div class="panel" id="panel-url">
        <form onsubmit="navigateUrl(event)">
          <div class="input-row">
            <input class="search-input" id="url-input" type="text" placeholder="https://example.com" autocomplete="off" />
            <button class="go-btn" type="submit">Visit →</button>
          </div>
        </form>
        <div class="hint">↳ HTTP &amp; HTTPS supported · Traffic proxied through this server</div>
      </div>
    </div>

    <div class="quick-section">
      <div class="quick-label">Quick Access</div>
      <div class="quick-grid">
        <a class="quick-card" href="/proxy?url=https%3A%2F%2Fwikipedia.org">
          <span class="quick-icon">📖</span>
          <span class="quick-name">Wikipedia</span>
        </a>
        <a class="quick-card" href="/proxy?url=https%3A%2F%2Fnews.ycombinator.com">
          <span class="quick-icon">🔶</span>
          <span class="quick-name">HN</span>
        </a>
        <a class="quick-card" href="/proxy?url=https%3A%2F%2Farchive.org">
          <span class="quick-icon">🏛</span>
          <span class="quick-name">Archive</span>
        </a>
        <a class="quick-card" href="/proxy?url=https%3A%2F%2Fgithub.com%2Ftrending">
          <span class="quick-icon">🐙</span>
          <span class="quick-name">GitHub</span>
        </a>
      </div>
    </div>

  </div>

  <div class="status-bar">
    <div class="status-dot"></div>
    <span>Server proxy active</span>
    <span style="margin-left:auto; opacity:0.4">All requests routed through Node.js · Client IP never exposed</span>
  </div>

  <script>
    function switchTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + name).classList.add('active');
      event.target.classList.add('active');
      setTimeout(() => {
        const input = document.querySelector('#panel-' + name + ' input');
        if (input) input.focus();
      }, 50);
    }

    function navigateUrl(e) {
      e.preventDefault();
      let val = document.getElementById('url-input').value.trim();
      if (!val) return;
      if (!val.startsWith('http://') && !val.startsWith('https://')) val = 'https://' + val;
      window.location.href = '/proxy?url=' + encodeURIComponent(val);
    }
  </script>
</body>
</html>
